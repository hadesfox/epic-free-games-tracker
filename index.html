<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>Epic Games Store 免费游戏赠送全记录</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');

* { margin:0; padding:0; box-sizing: border-box; }

:root {
  --bg-primary: #0a0a0f;
  --bg-secondary: #12121a;
  --bg-card: #1a1a2e;
  --bg-hover: #22223a;
  --text-primary: #e8e8f0;
  --text-secondary: #8888a0;
  --text-muted: #55556a;
  --accent: #0078f2;
  --accent-glow: rgba(0, 120, 242, 0.3);
  --border: rgba(255,255,255,0.06);
  --success: #00c853;
  --warning: #ffab00;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  min-height: 100vh;
  overflow-x: hidden;
}

.hero {
  position: relative;
  padding: 80px 20px 60px;
  text-align: center;
  background: linear-gradient(180deg, #0d1025 0%, var(--bg-primary) 100%);
  overflow: hidden;
}

.hero::before {
  content: '';
  position: absolute;
  top: -50%;
  left: -50%;
  width: 200%;
  height: 200%;
  background: radial-gradient(ellipse at 30% 50%, rgba(0,120,242,0.08) 0%, transparent 50%),
              radial-gradient(ellipse at 70% 50%, rgba(120,0,242,0.05) 0%, transparent 50%);
  animation: heroBg 20s ease-in-out infinite alternate;
}

@keyframes heroBg {
  0% { transform: translate(0, 0) rotate(0deg); }
  100% { transform: translate(-2%, -1%) rotate(1deg); }
}

.hero-content { position: relative; z-index: 1; max-width: 800px; margin: 0 auto; }

.hero-logo {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 1.1rem;
  font-weight: 600;
  color: var(--accent);
  margin-bottom: 20px;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.hero-logo svg { width: 24px; height: 24px; }

.hero h1 {
  font-size: 3rem;
  font-weight: 900;
  line-height: 1.1;
  margin-bottom: 16px;
  background: linear-gradient(135deg, #fff 0%, #a0a0c0 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}

.hero p {
  font-size: 1.05rem;
  color: var(--text-secondary);
  line-height: 1.6;
  max-width: 600px;
  margin: 0 auto;
}

.stats-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 16px;
  margin-top: 36px;
}

.stat-card {
  background: rgba(255,255,255,0.03);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px 16px;
  transition: transform 0.2s, border-color 0.2s;
}

.stat-card:hover {
  transform: translateY(-2px);
  border-color: rgba(0,120,242,0.3);
}

.stat-value {
  font-size: 2rem;
  font-weight: 800;
  color: var(--accent);
  line-height: 1.2;
}

.stat-label {
  font-size: 0.78rem;
  color: var(--text-muted);
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.controls {
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(10,10,15,0.92);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 20px;
}

.controls-inner {
  max-width: 1400px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  gap: 12px;
}

.search-box {
  display: flex;
  align-items: center;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 8px 14px;
  flex: 0 1 280px;
  transition: border-color 0.2s;
}

.search-box:focus-within { border-color: var(--accent); }

.search-box svg { width: 16px; height: 16px; color: var(--text-muted); flex-shrink: 0; }
.search-box input {
  border: none;
  background: none;
  color: var(--text-primary);
  font-size: 0.9rem;
  outline: none;
  margin-left: 8px;
  width: 100%;
}

.year-filters {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  flex-shrink: 0;
}

.year-filters::-webkit-scrollbar { height: 0; }

.year-btn {
  padding: 6px 14px;
  border-radius: 6px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  font-size: 0.82rem;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  font-family: inherit;
}

.year-btn:hover { border-color: var(--accent); color: var(--text-primary); }
.year-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

.sort-select {
  margin-left: auto;
  padding: 8px 12px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: var(--bg-secondary);
  color: var(--text-primary);
  font-size: 0.85rem;
  cursor: pointer;
  font-family: inherit;
  flex-shrink: 0;
}

.sort-select:focus { border-color: var(--accent); outline: none; }

.results-bar {
  max-width: 1400px;
  margin: 0 auto;
  padding: 16px 20px 0;
  font-size: 0.82rem;
  color: var(--text-muted);
}

.results-bar span { color: var(--text-secondary); font-weight: 600; }

.games-container {
  max-width: 1400px;
  margin: 0 auto;
  padding: 12px 20px 60px;
}

.year-section { margin-bottom: 40px; }

.year-header {
  display: flex;
  align-items: baseline;
  gap: 12px;
  margin-bottom: 16px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--border);
}

.year-header h2 {
  font-size: 1.6rem;
  font-weight: 800;
  color: var(--text-primary);
}

.year-count {
  font-size: 0.85rem;
  color: var(--text-muted);
  font-weight: 500;
}

/* Card Grid */
.game-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
  gap: 16px;
}

.game-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  transition: transform 0.2s, border-color 0.2s, box-shadow 0.2s;
  cursor: default;
}

.game-card:hover {
  transform: translateY(-4px);
  border-color: rgba(0,120,242,0.3);
  box-shadow: 0 8px 32px rgba(0,0,0,0.3), 0 0 0 1px rgba(0,120,242,0.1);
}

.card-image {
  width: 100%;
  aspect-ratio: 16/9;
  background: var(--bg-secondary);
  position: relative;
  overflow: hidden;
}

.card-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform 0.3s;
}

.game-card:hover .card-image img { transform: scale(1.05); }

.card-image-placeholder {
  width: 100%;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 2.2rem;
  font-weight: 800;
  color: rgba(255,255,255,0.1);
  text-transform: uppercase;
  letter-spacing: 2px;
  user-select: none;
}

.card-badge {
  position: absolute;
  top: 8px;
  right: 8px;
  padding: 3px 8px;
  border-radius: 6px;
  font-size: 0.72rem;
  font-weight: 600;
  backdrop-filter: blur(8px);
}

.card-body { padding: 12px 14px 14px; }

.card-name-cn {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.3;
  margin-bottom: 2px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-name-en {
  font-size: 0.78rem;
  color: var(--text-muted);
  line-height: 1.3;
  margin-bottom: 8px;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.card-dates {
  font-size: 0.75rem;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 6px;
}

.card-dates svg { width: 12px; height: 12px; flex-shrink: 0; opacity: 0.6; }

.card-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-top: 8px;
}

.duration-badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 4px;
  font-size: 0.72rem;
  font-weight: 600;
}

.dur-short { background: rgba(0,200,83,0.15); color: #00c853; }
.dur-medium { background: rgba(255,171,0,0.15); color: #ffab00; }
.dur-long { background: rgba(0,120,242,0.15); color: #4da6ff; }
.dur-extended { background: rgba(206,147,216,0.15); color: #ce93d8; }
.dur-ultra { background: rgba(239,83,80,0.15); color: #ef5350; }

.card-index {
  font-size: 0.7rem;
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  opacity: 0.6;
}

.footer {
  text-align: center;
  padding: 40px 20px;
  border-top: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.8rem;
}

.footer a { color: var(--accent); text-decoration: none; }

.empty-state {
  text-align: center;
  padding: 80px 20px;
  color: var(--text-muted);
}

.empty-state p { font-size: 1.1rem; }

@media (max-width: 768px) {
  .hero { padding: 40px 16px 32px; }
  .hero h1 { font-size: 2rem; }
  .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
  .stat-card { padding: 16px 12px; }
  .stat-value { font-size: 1.5rem; }
  .controls-inner { flex-direction: column; align-items: stretch; }
  .search-box { min-width: 100%; flex: 1; }
  .year-filters { width: 100%; overflow-x: auto; flex-wrap: nowrap; padding-bottom: 4px; }
  .sort-select { margin-left: 0; width: 100%; }
  .game-grid { grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 10px; }
  .card-body { padding: 10px 12px 12px; }
  .card-name-cn { font-size: 0.85rem; }
  .card-name-en { font-size: 0.72rem; }
}

@media (max-width: 480px) {
  .game-grid { grid-template-columns: repeat(2, 1fr); gap: 8px; }
}

::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }

.fade-in { animation: fadeIn 0.3s ease-out; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.loading-overlay {
  display: inline-block;
  width: 12px;
  height: 12px;
  border: 2px solid var(--text-muted);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* Refresh Button */
.refresh-btn {
  display: flex; align-items: center; gap: 6px;
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-secondary); padding: 6px 14px; border-radius: 8px;
  cursor: pointer; transition: all 0.2s; font-size: 0.85rem; font-weight: 500;
  margin-left: auto;
}
.refresh-btn:hover { background: var(--bg-hover); border-color: var(--accent); color: var(--text-primary); }
.refresh-btn.loading { opacity: 0.7; pointer-events: none; }
.refresh-btn.loading #refreshIcon { animation: spin 0.8s linear infinite; }
.refresh-btn.success { border-color: var(--success); color: var(--success); }
.refresh-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

/* View Toggle */
.view-toggle { display: flex; gap: 4px; }
.view-toggle button { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-muted); padding: 6px 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s; font-size: 1rem; }
.view-toggle button.active { background: var(--accent); color: #fff; border-color: var(--accent); }

/* List View */
.list-view .game-grid { grid-template-columns: 1fr; gap: 8px; }
.list-view .game-card { display: flex; flex-direction: row; }
.list-view .card-image { width: 200px; flex-shrink: 0; aspect-ratio: 16/9; }
.list-view .card-image img { width: 100%; height: 100%; object-fit: cover; }
.list-view .card-body { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 12px 16px; }
.list-view .card-name-cn { font-size: 1rem; }
.list-view .card-name-en { font-size: 0.8rem; }
</style>
</head>

// ============================================================
// IMAGE LOADING
// ============================================================
var steamIdCache = {};
var pendingLookups = {};
var lookupQueue = [];

function lookupSteamId(gameName) {
  var key = gameName.toLowerCase().trim();
  if (steamIdCache[key] !== undefined) return steamIdCache[key];
  if (pendingLookups[key]) return null;
  pendingLookups[key] = true;
  lookupQueue.push(key);
  return null;
}

function processQueue() {
  if (lookupQueue.length === 0) return;
  var batch = lookupQueue.splice(0, 3);
  batch.forEach(function(name) {
    fetch('https://www.cheapshark.com/api/1.0/games?title=' + encodeURIComponent(name) + '&limit=1')
      .then(function(r) { return r.json(); })
      .then(function(data) {
        if (data && data.length > 0 && data[0].steamAppID) {
          steamIdCache[name] = data[0].steamAppID;
        } else {
          steamIdCache[name] = null;
        }
        pendingLookups[name] = false;
        renderLoadedImages();
      })
      .catch(function() {
        steamIdCache[name] = null;
        pendingLookups[name] = false;
      });
  });
  if (lookupQueue.length > 0) setTimeout(processQueue, 300);
}

function renderLoadedImages() {
  // 图像现在在 renderGames() 中直接渲染，此函数保留以防需要延迟加载
  var cards = document.querySelectorAll('.card-image img[src=""]');
  for (var i = 0; i < cards.length; i++) {
    var img = cards[i];
    var lookup = img.getAttribute('data-lookup');
    if (lookup && STEAM_IDS[lookup] && STEAM_IDS[lookup].header) {
      img.src = STEAM_IDS[lookup].header;
    }
  }
}

// ============================================================
// UTILITY FUNCTIONS
// ============================================================
function parseDateStr(str) {
  return new Date(str + 'T00:00:00');
}

function daysBetween(d1, d2) {
  var ms = d2.getTime() - d1.getTime();
  return Math.max(1, Math.round(ms / 86400000));
}

function getDurationClass(days) {
  if (days <= 1) return 'dur-short';
  if (days <= 7) return 'dur-medium';
  if (days <= 14) return 'dur-long';
  if (days <= 30) return 'dur-extended';
  return 'dur-ultra';
}

function getDurationText(days) {
  if (days === 1) return '1 天';
  return days + ' 天';
}

function formatDate(d) {
  var m = d.getMonth() + 1;
  var day = d.getDate();
  return d.getFullYear() + '.' + String(m).padStart(2,'0') + '.' + String(day).padStart(2,'0');
}

function getCnName(name) {
  var key = name.toLowerCase().trim();
  return CN[key] || name;
}

// ============================================================
// PROCESS GAMES
// ============================================================
var processedGames = GAMES.map(function(g) {
  var s = parseDateStr(g.start);
  var e = parseDateStr(g.end);
  var days = daysBetween(s, e);
  var d = new Date(g.start + 'T00:00:00');
  return {
    name: g.name,
    nameCn: getCnName(g.name),
    start: g.start,
    end: g.end,
    startDate: s,
    endDate: e,
    days: days,
    year: d.getFullYear()
  };
});

// Stats
var allYears = [];
var yearSet = {};
processedGames.forEach(function(g) { if (!yearSet[g.year]) { yearSet[g.year] = true; allYears.push(g.year); } });
allYears.sort(function(a,b) { return b - a; });

var uniqueGames = {};
processedGames.forEach(function(g) { uniqueGames[g.name.toLowerCase().trim()] = true; });
var totalDays = processedGames.reduce(function(sum, g) { return sum + g.days; }, 0);

document.getElementById('statTotal').textContent = processedGames.length;
document.getElementById('statGames').textContent = Object.keys(uniqueGames).length;
document.getElementById('statYears').textContent = allYears.length;
document.getElementById('statDays').textContent = totalDays.toLocaleString();

// Year filter buttons
var yearFiltersEl = document.getElementById('yearFilters');
var filterHTML = '<button class="year-btn active" data-year="all">全部</button>';
allYears.forEach(function(y) {
  filterHTML += '<button class="year-btn" data-year="' + y + '">' + y + '</button>';
});
yearFiltersEl.innerHTML = filterHTML;

// State
var currentYear = 'all';
var currentSearch = '';
var currentSort = 'date-desc';
var currentView = 'grid';

function setView(view) {
  currentView = view;
  var container = document.getElementById('gamesContainer');
  container.className = 'games-container' + (view === 'list' ? ' list-view' : '');
  document.getElementById('btnGrid').classList.toggle('active', view === 'grid');
  document.getElementById('btnList').classList.toggle('active', view === 'list');
  // Re-render to apply layout
  renderGames();
}

function getFilteredGames() {
  var games = processedGames.slice();
  if (currentYear !== 'all') {
    var yr = parseInt(currentYear);
    games = games.filter(function(g) { return g.year === yr; });
  }
  if (currentSearch) {
    var q = currentSearch.toLowerCase();
    games = games.filter(function(g) {
      return g.name.toLowerCase().indexOf(q) !== -1 || g.nameCn.toLowerCase().indexOf(q) !== -1;
    });
  }
  switch (currentSort) {
    case 'date-desc': games.sort(function(a,b) { return b.startDate - a.startDate; }); break;
    case 'date-asc': games.sort(function(a,b) { return a.startDate - b.startDate; }); break;
    case 'name-asc': games.sort(function(a,b) { return a.nameCn.localeCompare(b.nameCn) || a.name.localeCompare(b.name); }); break;
    case 'name-desc': games.sort(function(a,b) { return b.nameCn.localeCompare(a.nameCn) || b.name.localeCompare(a.name); }); break;
    case 'duration-desc': games.sort(function(a,b) { return b.days - a.days; }); break;
    case 'duration-asc': games.sort(function(a,b) { return a.days - b.days; }); break;
  }
  return games;
}

function renderGames() {
  var games = getFilteredGames();
  var container = document.getElementById('gamesContainer');
  document.getElementById('resultsCount').textContent = games.length;
  document.getElementById('resultsTotal').textContent = processedGames.length;
  if (games.length === 0) {
    container.innerHTML = '<div class="empty-state"><p>没有找到匹配的游戏</p></div>';
    return;
  }
  var grouped = {};
  games.forEach(function(g) {
    if (!grouped[g.year]) grouped[g.year] = [];
    grouped[g.year].push(g);
  });
  var html = '';
  Object.keys(grouped).sort(function(a,b) { return b - a; }).forEach(function(year) {
    var yearGames = grouped[year];
    html += '<div class="year-section fade-in"><div class="year-header"><h2>' + year + '</h2><span class="year-count">' + yearGames.length + ' 款</span></div><div class="game-grid">';
    yearGames.forEach(function(g, i) {
      var durClass = getDurationClass(g.days);
      var lookupKey = g.name.toLowerCase().trim();
      var cachedId = steamIdCache[lookupKey];
      var imgContent = '';
      var steamData = STEAM_IDS[lookupKey];
      if (steamData && steamData.header) {
        imgContent = '<img src="' + steamData.header + '" alt="' + g.name + '" loading="lazy">';
      } else {
        imgContent = '<div class="card-image-placeholder">' + g.nameCn.charAt(0) + '</div>';
      }
      html += '<div class="game-card">';
      html += '<div class="card-image">' + imgContent + '</div>';
      html += '<div class="card-body">';
      html += '<div class="card-name-cn">' + g.nameCn + '</div>';
      html += '<div class="card-name-en">' + g.name + '</div>';
      html += '<div class="card-dates"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>' + formatDate(g.startDate) + ' ~ ' + formatDate(g.endDate) + '</div>';
      html += '<div class="card-footer"><span class="duration-badge ' + durClass + '">' + getDurationText(g.days) + '</span><span class="card-index">#' + (i + 1) + '</span></div>';
      html += '</div></div>';
    });
    html += '</div></div>';
  });
  container.innerHTML = html;
}

document.getElementById('searchInput').addEventListener('input', function(e) {
  currentSearch = e.target.value.trim();
  renderGames();

});


// ============================================================
// REFRESH: FETCH LATEST EPIC FREE GAMES
// ============================================================
// Epic 官方 API（通过 CORS 代理）
var EPIC_API_URL = 'https://store-site-backend-static.ak.epicgames.com/freeGamesPromotions?locale=zh-CN&country=CN&allowCountries=CN';
var CORS_PROXIES = [
  'https://corsproxy.io/?',
  'https://api.allorigins.win/raw?url=',
  'https://api.codetabs.com/v1/proxy?quest='
];

function fetchLatestGames() {
  var btn = document.getElementById('btnRefresh');
  var label = document.getElementById('refreshLabel');
  if (btn.classList.contains('loading')) return;

  btn.classList.add('loading');
  btn.classList.remove('success');
  label.textContent = '获取中…';

  // 尝试多个代理，成功即停止
  tryProxy(0);
}

function tryProxy(idx) {
  if (idx >= CORS_PROXIES.length) {
    onRefreshError('网络请求失败，请稍后重试');
    return;
  }
  var proxyUrl = CORS_PROXIES[idx] + encodeURIComponent(EPIC_API_URL);
  fetch(proxyUrl)
    .then(function(r) {
      if (!r.ok) throw new Error('HTTP ' + r.status);
      return r.json();
    })
    .then(function(data) {
      processEpicData(data);
    })
    .catch(function() {
      // 尝试下一个代理
      tryProxy(idx + 1);
    });
}

function processEpicData(data) {
  try {
    var elements = (data.data && data.data.Catalog && data.data.Catalog.searchStore && data.data.Catalog.searchStore.elements) || [];
    if (!elements.length) {
      onRefreshError('未获取到数据，请稍后重试');
      return;
    }

    var newGames = [];
    var now = new Date();

    elements.forEach(function(el) {
      var promos = el.promotions;
      if (!promos) return;

      // 取当前促销或即将促销的免费赠送
      var offerGroups = (promos.promotionalOffers || []).concat(promos.upcomingPromotionalOffers || []);
      offerGroups.forEach(function(group) {
        (group.promotionalOffers || []).forEach(function(offer) {
          var disc = offer.discountSetting;
          if (!disc || disc.discountPercentage !== 0) return; // 只要 100% 折扣

          var startDate = offer.startDate ? offer.startDate.replace('Z','').split('.')[0] : null;
          var endDate = offer.endDate ? offer.endDate.replace('Z','').split('.')[0] : null;
          if (!startDate || !endDate) return;

          var start = startDate.slice(0, 10); // YYYY-MM-DD
          var end = endDate.slice(0, 10);

          var name = el.title;
          if (!name || name === 'Mystery Game') return; // 跳过神秘游戏

          newGames.push({ name: name, start: start, end: end });
        });
      });
    });

    if (!newGames.length) {
      onRefreshDone(0, 'Epic 当前没有进行中的免费赠送活动');
      return;
    }

    // 与现有 GAMES 对比，找出新记录
    var existingKeys = {};
    GAMES.forEach(function(g) {
      existingKeys[g.name.toLowerCase().trim() + '_' + g.start] = true;
    });

    var added = 0;
    newGames.forEach(function(g) {
      var key = g.name.toLowerCase().trim() + '_' + g.start;
      if (!existingKeys[key]) {
        GAMES.push(g);
        added++;
      }
    });

    if (added > 0) {
      // 重新处理数据并更新视图
      rebuildProcessedGames();
      setView(currentView);

      // 更新底部时间显示
      var nowStr = now.getFullYear() + ' 年 ' + (now.getMonth()+1) + ' 月 ' + now.getDate() + ' 日 ' + String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
      var el = document.getElementById('lastUpdateTime');
      if (el) el.textContent = '最后更新：' + nowStr;

      onRefreshDone(added, '新增 ' + added + ' 条记录！');
    } else {
      onRefreshDone(0, '数据已是最新');
    }
  } catch(e) {
    onRefreshError('解析数据失败：' + e.message);
  }
}

function rebuildProcessedGames() {
  // 重新处理 GAMES 数组
  processedGames = GAMES.map(function(g) {
    var s = parseDateStr(g.start);
    var e = parseDateStr(g.end);
    var days = daysBetween(s, e);
    var d = new Date(g.start + 'T00:00:00');
    return {
      name: g.name,
      nameCn: getCnName(g.name),
      start: g.start,
      end: g.end,
      startDate: s,
      endDate: e,
      days: days,
      year: d.getFullYear()
    };
  });

  // 重新计算统计
  var yearSet2 = {};
  allYears = [];
  processedGames.forEach(function(g) { if (!yearSet2[g.year]) { yearSet2[g.year] = true; allYears.push(g.year); } });
  allYears.sort(function(a,b) { return b - a; });

  var uniqueGames2 = {};
  processedGames.forEach(function(g) { uniqueGames2[g.name.toLowerCase().trim()] = true; });
  var totalDays2 = processedGames.reduce(function(sum, g) { return sum + g.days; }, 0);

  document.getElementById('statTotal').textContent = processedGames.length;
  document.getElementById('statGames').textContent = Object.keys(uniqueGames2).length;
  document.getElementById('statYears').textContent = allYears.length;
  document.getElementById('statDays').textContent = totalDays2.toLocaleString();

  // 重建年份筛选
  var filterHTML2 = '<button class="year-btn' + (currentYear === 'all' ? ' active' : '') + '" data-year="all">全部</button>';
  allYears.forEach(function(y) {
    filterHTML2 += '<button class="year-btn' + (currentYear == y ? ' active' : '') + '" data-year="' + y + '">' + y + '</button>';
  });
  document.getElementById('yearFilters').innerHTML = filterHTML2;
}

function onRefreshDone(count, msg) {
  var btn = document.getElementById('btnRefresh');
  var label = document.getElementById('refreshLabel');
  btn.classList.remove('loading');
  btn.classList.add('success');
  label.textContent = msg;
  setTimeout(function() {
    btn.classList.remove('success');
    label.textContent = '刷新数据';
  }, 3000);
}

function onRefreshError(msg) {
  var btn = document.getElementById('btnRefresh');
  var label = document.getElementById('refreshLabel');
  btn.classList.remove('loading');
  label.textContent = msg;
  setTimeout(function() {
    label.textContent = '刷新数据';
  }, 4000);
}

// Initial render
setView('grid');
renderGames();
</script>
